<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Admission Application Form</h2>
        <form action="#" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="pass-year">Year of Passing (12th)</label>
                <input type="number" id="pass-year" name="pass_year" min="2020" max="2026" placeholder="e.g., 2026" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="marks-10">10th Marks (%)</label>
                    <input type="number" id="marks-10" name="marks_10" step="0.01" min="0" max="100" placeholder="Percentage" required>
                </div>
                <div class="form-group">
                    <label for="marks-12">12th Marks (%)</label>
                    <input type="number" id="marks-12" name="marks_12" step="0.01" min="0" max="100" placeholder="Percentage" required>
                </div>
            </div>

            <div class="form-group">
                <label for="jee-marks">JEE Main Score / Percentile</label>
                <input type="number" id="jee-marks" name="jee_marks" step="0.0000001" min="0" max="100" placeholder="Enter JEE Percentile" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="course">Course</label>
                    <select id="course" name="course" required>
                        <option value="" disabled selected>Select Course</option>
                        <option value="btech">B.Tech</option>
                        <option value="mtech">M.Tech</option>
                        <option value="bca">BCA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="branch">Branch</label>
                    <select id="branch" name="branch" required>
                        <option value="" disabled selected>Select Branch</option>
                        <option value="cse">Computer Science & Engineering</option>
                        <option value="ece">Electronics & Communication</option>
                        <option value="it">Information Technology</option>
                        <option value="me">Mechanical Engineering</option>
                        <option value="ee">Electrical Engineering</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="photo-upload">Upload Photo (JPEG/PNG)</label>
                    <input type="file" id="photo-upload" name="photo_upload" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label for="doc-upload">Upload Documents (PDF)</label>
                    <input type="file" id="doc-upload" name="doc_upload" accept=".pdf" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>

</body>
</html>
